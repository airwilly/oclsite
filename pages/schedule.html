<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule &amp; Results — Old Colony Four Ball League</title>
  <!-- One level up because this page lives in /pages/ -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- =====================
       Compact Page Header
       Logo 2 left, nav right. Hamburger replaces links on mobile.
       ===================== -->
  <header class="page-header">
    <a href="../index.html" class="logo-link">
      <img
        src="../assets/images/ocl2_nb.png"
        alt="Old Colony Four Ball League — return to home"
        class="compact-logo"
      >
    </a>
    <nav aria-label="Primary navigation">
      <ul class="nav-links" id="nav-links">
        <li><a href="schedule.html" class="active">Schedule &amp; Results</a></li>
        <li><a href="standings.html">Standings</a></li>
        <li><a href="rules.html">Rules</a></li>
        <li><a href="games.html">Games</a></li>
      </ul>
      <button class="nav-toggle" id="nav-toggle" aria-label="Open navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>
  </header>

  <!-- =====================
       Main Content
       The table body is empty — js/schedule.js fills it in.
       ===================== -->
  <main>
    <section>
      <h2 class="page-heading">2026 Schedule &amp; Results</h2>

      <!--
        .table-wrapper enables horizontal scroll on narrow screens
        so the table never gets squished below its min-width.
      -->
      <div id="schedule-container" class="table-wrapper">
        <table class="data-table" id="schedule-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Time</th>
              <th>Home Team</th>
              <th>Away Team</th>
              <th>Home Pts</th>
              <th>Away Pts</th>
            </tr>
          </thead>
          <tbody id="schedule-body">
            <!-- Rows are inserted here by js/schedule.js -->
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- =====================
       Site Footer
       ===================== -->
  <footer class="site-footer">
    <p>&copy; 2026 Old Colony Four Ball League</p>
  </footer>

  <!-- Script at end of body so the DOM is ready when it runs.
       Path is one level up because this page lives in /pages/. -->
  <script src="../js/schedule.js"></script>
  <script src="../js/nav.js"></script>

</body>
</html>
